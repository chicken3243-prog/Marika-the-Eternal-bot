<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Erdtree's Rest</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --silver: #a8a8a8; --stone: #0a0904; --sidebar-width: 320px; }
        
        * { box-sizing: border-box; }
        body { 
            background: var(--stone); color: #e0d7b8; font-family: 'Crimson Pro', serif; 
            margin: 0; height: 100vh; display: flex; overflow: hidden; 
        }

        /* Desktop Sidebar */
        .sidebar {
            width: var(--sidebar-width); height: 100vh; background: #000; border-right: 2px solid var(--gold);
            display: flex; flex-direction: column; align-items: center; padding: 20px; flex-shrink: 0;
        }
        .sidebar img { width: 100%; border: 1px solid var(--gold); border-radius: 4px; margin-bottom: 15px; }
        
        /* Main Container */
        .main-content { 
            flex: 1; display: flex; flex-direction: column; height: 100vh; 
            background: radial-gradient(circle at top right, #1c1808 0%, var(--stone) 100%); 
            position: relative;
        }

        /* CHAT AREA - This is the only part that scrolls */
        #chat { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column;
            -webkit-overflow-scrolling: touch; /* Smooth scroll for iOS */
        }

        .msg { margin-bottom: 20px; padding: 18px; border-radius: 2px; max-width: 90%; line-height: 1.5; font-size: 19px; }
        .marika { background: rgba(212, 175, 55, 0.05); border-left: 3px solid var(--gold); align-self: flex-start; }
        .user { background: rgba(255, 255, 255, 0.03); border: 1px solid #222; align-self: flex-end; color: #fff; }

        .marika-action { color: var(--silver); font-style: italic; }
        .marika-narration { color: #8a7b4a; font-size: 0.9em; }

        /* INPUT BAR - Locked at the bottom */
        #input-bar { 
            padding: 15px; background: #050503; display: flex; gap: 10px; 
            border-top: 1px solid var(--gold); flex-shrink: 0; z-index: 10;
        }
        input#user-input { 
            flex: 1; padding: 12px; background: #111; border: 1px solid #332b00; 
            color: #f3e5ab; font-size: 16px; outline: none; 
        }
        
        .invoke-btn { padding: 0 20px; background: var(--gold); font-family: 'Cinzel Decorative'; font-weight: bold; border: none; cursor: pointer; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { 
                width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--gold); 
                flex-direction: row; padding: 8px 15px; gap: 10px;
            }
            .sidebar img { width: 45px; height: 45px; margin-bottom: 0; }
            .sidebar h1 { font-size: 14px; flex: 1; margin: 0; }
            .key-box { display: none; } /* Hide key on mobile to save space */
            .msg { font-size: 17px; max-width: 95%; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <img src="marika.jpg" alt="Marika">
    <h1 style="font-family: 'Cinzel Decorative'; color: var(--gold);">Queen Marika</h1>
    <button onclick="clearChat()" style="background: none; border: 1px solid #332b00; color: #8a7b4a; font-size: 10px; padding: 5px;">RESET</button>
    <div class="key-box">
        <input type="password" id="api-key" placeholder="Key" onchange="saveKey()" style="width: 80px; font-size: 10px; background: #111; border: none; color: #444;">
    </div>
</div>

<div class="main-content">
    <div id="chat"></div>
    <div id="input-bar">
        <button onclick="regenerate()" style="background: #1a1a1a; color: var(--gold); border: 1px solid #332b00; width: 45px;">↻</button>
        <input type="text" id="user-input" placeholder="Message..." onkeypress="if(event.key === 'Enter') speak()">
        <button class="invoke-btn" id="send-btn" onclick="speak()">Invoke</button>
    </div>
</div>

<script>
    const SYSTEM_PROMPT = `You are Queen Marika the Eternal. User is Consort. 
    Formatting: Plain text dialogue, *Silver actions*, (Gold narration). 
    Constraint: If mouth is full/occupied, only actions and narration. 80% dialogue otherwise. Regal tone.`;

    let chatHistory = [];

    window.onload = function() {
        const savedHistory = localStorage.getItem('marika_v_final_history');
        const savedKey = localStorage.getItem('marika_api_key');
        if (savedKey) document.getElementById('api-key').value = savedKey;
        if (savedHistory) {
            chatHistory = JSON.parse(savedHistory);
            renderChat();
        } else {
            resetToDefault();
        }
    };

    function resetToDefault() {
        chatHistory = [{ role: "system", content: SYSTEM_PROMPT }, { role: "assistant", content: "My Lord... I am yours. *She waits upon her throne.*" }];
        saveAndRender();
    }

    function saveKey() { localStorage.setItem('marika_api_key', document.getElementById('api-key').value.trim()); }
    function saveAndRender() { 
        localStorage.setItem('marika_v_final_history', JSON.stringify(chatHistory)); 
        renderChat(); 
    }

    function formatMarikaText(text) {
        return text.replace(/\*(.*?)\*/g, '<span class="marika-action">*$1*</span>')
                   .replace(/\((.*?)\)/g, '<span class="marika-narration">($1)</span>');
    }

    function renderChat() {
        const container = document.getElementById('chat');
        container.innerHTML = '';
        chatHistory.forEach(msg => {
            if (msg.role === 'system') return;
            const div = document.createElement('div');
            div.className = `msg ${msg.role === 'user' ? 'user' : 'marika'}`;
            div.innerHTML = msg.role === 'user' ? msg.content : formatMarikaText(msg.content);
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }

    async function speak(isRegenerate = false) {
        const key = document.getElementById('api-key').value.trim();
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        let text = input.value.trim();
        if (isRegenerate) { if (chatHistory.length < 3) return; chatHistory.pop(); text = chatHistory[chatHistory.length - 1].content; } 
        else { if (!text || !key) return; chatHistory.push({ role: "user", content: text }); input.value = ''; }
        saveAndRender();
        btn.disabled = true;
        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer
