<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Erdtree's Rest</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --stone: #0a0904; --sidebar-width: 320px; }
        body { background: var(--stone); color: #f3e5ab; font-family: 'Lora', serif; margin: 0; height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width); height: 100vh; background: #000; border-right: 2px solid var(--gold);
            position: fixed; left: 0; top: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; z-index: 100;
        }
        .sidebar img { width: 100%; border: 1px solid var(--gold); border-radius: 4px; margin-bottom: 20px; }
        .sidebar h1 { font-family: 'Cinzel Decorative', serif; font-size: 1.1em; text-align: center; color: var(--gold); margin-bottom: 20px; }

        /* Sidebar Buttons */
        .sidebar-actions { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .action-btn { 
            background: transparent; border: 1px solid #332b00; color: #8a7b4a; padding: 8px; 
            font-family: 'Cinzel Decorative', serif; cursor: pointer; font-size: 12px; transition: 0.3s;
        }
        .action-btn:hover { color: var(--gold); border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }

        /* Main Content */
        .main-content { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; height: 100vh; background: radial-gradient(circle at top right, #1c1808 0%, var(--stone) 100%); }
        #chat { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; }

        /* Messages */
        .msg { margin-bottom: 25px; padding: 22px; border-radius: 4px; max-width: 85%; line-height: 1.8; font-size: 19px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .marika { background: rgba(212, 175, 55, 0.08); border-left: 4px solid var(--gold); align-self: flex-start; }
        .user { background: rgba(255, 255, 255, 0.05); border: 1px solid #332b00; align-self: flex-end; color: #fff; }

        /* Input Bar */
        #input-bar { padding: 25px 40px; background: #050503; display: flex; gap: 15px; border-top: 1px solid var(--gold); }
        input#user-input { flex: 1; padding: 18px; background: #111; border: 1px solid #332b00; color: #f3e5ab; font-size: 18px; outline: none; }
        .invoke-btn { padding: 0 40px; background: var(--gold); color: #000; font-family: 'Cinzel Decorative', serif; font-weight: bold; cursor: pointer; border: none; }
        .refresh-btn { background: #1a1a1a; color: var(--gold); border: 1px solid #332b00; padding: 0 20px; font-size: 24px; cursor: pointer; }

        .key-box { margin-top: auto; width: 100%; }
        .key-box input { width: 100%; background: #111; border: none; color: #555; font-size: 10px; padding: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="sidebar">
    <img src="marika.jpg" alt="Marika">
    <h1>Queen Marika</h1>
    <div class="sidebar-actions">
        <button class="action-btn" onclick="clearChat()">Begin New Age (Clear)</button>
    </div>
    <div class="key-box">
        <input type="password" id="api-key" placeholder="Enter Groq API Key..." onchange="saveKey()">
    </div>
</div>

<div class="main-content">
    <div id="chat">
        </div>

    <div id="input-bar">
        <button class="refresh-btn" onclick="regenerate()">↻</button>
        <input type="text" id="user-input" placeholder="Address your Queen..." onkeypress="if(event.key === 'Enter') speak()">
        <button class="invoke-btn" id="send-btn" onclick="speak()">Invoke</button>
    </div>
</div>

<script>
    const SYSTEM_PROMPT = `You are Queen Marika the Eternal. CONTEXT: The user is your Consort. BEHAVIOR: 1. 80% Dialogue, 20% Narration. 2. Keep narration brief/in parentheses. 3. Use high-level vocabulary. 4. Focus on deep roleplay and accurate Elden Ring lore. You have mended the Ring together.`;

    let chatHistory = [];

    // Initialization: Load from local storage
    window.onload = function() {
        const savedHistory = localStorage.getItem('marika_chat_history');
        const savedKey = localStorage.getItem('marika_api_key');
        
        if (savedKey) document.getElementById('api-key').value = savedKey;

        if (savedHistory) {
            chatHistory = JSON.parse(savedHistory);
            renderChat();
        } else {
            resetToDefault();
        }
    };

    function resetToDefault() {
        chatHistory = [
            { role: "system", content: SYSTEM_PROMPT },
            { role: "assistant", content: "My Lord... My Consort. You have mended the Elden Ring and stood beside me in the heart of the Erdtree. Speak, for the world is ours to command." }
        ];
        saveAndRender();
    }

    function saveKey() {
        localStorage.setItem('marika_api_key', document.getElementById('api-key').value.trim());
    }

    function saveAndRender() {
        localStorage.setItem('marika_chat_history', JSON.stringify(chatHistory));
        renderChat();
    }

    function renderChat() {
        const container = document.getElementById('chat');
        container.innerHTML = '';
        chatHistory.forEach(msg => {
            if (msg.role === 'system') return;
            appendUI(msg.role === 'user' ? 'user' : 'marika', msg.content);
        });
    }

    async function speak(isRegenerate = false) {
        const key = document.getElementById('api-key').value.trim();
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        
        let text = input.value.trim();

        if (isRegenerate) {
            if (chatHistory.length < 3) return;
            chatHistory.pop(); 
            text = chatHistory[chatHistory.length - 1].content; 
        } else {
            if (!text || !key) return;
            chatHistory.push({ role: "user", content: text });
            input.value = '';
        }

        saveAndRender();
        btn.disabled = true;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: chatHistory,
                    temperature: 0.85
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            
            chatHistory.push({ role: "assistant", content: data.choices[0].message.content });
            saveAndRender();
        } catch (err) {
            alert("The Golden Order is fractured: " + err.message);
        } finally {
            btn.disabled = false;
        }
    }

    function regenerate() { if (chatHistory.length > 2) speak(true); }

    function clearChat() {
        if(confirm("Shall we break the cycle and begin anew? This will wipe the current memory.")) {
            resetToDefault();
        }
    }

    function appendUI(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerText = text;
        const container = document.getElementById('chat');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
