<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Erdtree's Rest</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --silver: #a8a8a8; --stone: #0a0904; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--stone); color: #e0d7b8; 
            font-family: 'Crimson Pro', serif; overflow: hidden;
        }

        /* SIDEBAR - Fixed on Desktop */
        #sidebar {
            position: absolute; left: 0; top: 0; bottom: 0;
            width: 300px; background: #000; border-right: 2px solid var(--gold);
            padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        #sidebar img { width: 100%; border: 1px solid var(--gold); border-radius: 4px; }
        #sidebar h1 { font-family: 'Cinzel Decorative'; color: var(--gold); font-size: 1.1em; text-align: center; }

        /* MAIN CHAT AREA */
        #main {
            position: absolute; left: 300px; right: 0; top: 0; bottom: 0;
            display: flex; flex-direction: column;
            background: radial-gradient(circle at top right, #1c1808 0%, var(--stone) 100%);
        }

        #chat-window {
            flex: 1; overflow-y: auto; padding: 30px;
            display: flex; flex-direction: column;
        }

        #input-area {
            height: 100px; background: #050503; border-top: 1px solid var(--gold);
            display: flex; align-items: center; padding: 0 20px; gap: 10px;
        }

        /* Elements */
        .msg { margin-bottom: 20px; padding: 20px; max-width: 85%; line-height: 1.6; font-size: 20px; }
        .marika { background: rgba(212, 175, 55, 0.05); border-left: 3px solid var(--gold); align-self: flex-start; }
        .user { background: rgba(255, 255, 255, 0.03); border: 1px solid #222; align-self: flex-end; color: #fff; }
        
        .marika-action { color: var(--silver); font-style: italic; }
        .marika-narration { color: #8a7b4a; font-size: 0.9em; }

        input { flex: 1; height: 50px; background: #111; border: 1px solid #332b00; color: #f3e5ab; font-size: 18px; padding: 0 15px; }
        button { height: 50px; padding: 0 25px; background: var(--gold); font-family: 'Cinzel Decorative'; font-weight: bold; border: none; cursor: pointer; }

        /* MOBILE OVERRIDE */
        @media (max-width: 800px) {
            #sidebar { position: relative; width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--gold); flex-direction: row; height: 80px; padding: 10px; }
            #sidebar img { width: 50px; height: 50px; margin: 0; }
            #sidebar h1 { font-size: 0.9em; margin-left: 10px; }
            #main { position: relative; left: 0; height: calc(100% - 80px); }
            .msg { font-size: 18px; max-width: 95%; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <img src="marika.jpg" alt="Marika">
    <h1>Queen Marika</h1>
    <button onclick="localStorage.removeItem('marika_v6'); location.reload();" style="background:none; color:#444; font-size:10px; border:none; margin-top:10px;">RESET AGE</button>
    <input type="password" id="api-key" placeholder="Key" onchange="localStorage.setItem('marika_key', this.value)" style="width:100%; height:30px; font-size:10px; margin-top:auto;">
</div>

<div id="main">
    <div id="chat-window"></div>
    <div id="input-area">
        <button onclick="regenerate()" style="background:#1a1a1a; color:var(--gold); border:1px solid #332b00; width:50px; padding:0;">↻</button>
        <input type="text" id="user-input" placeholder="Message..." onkeypress="if(event.key === 'Enter') speak()">
        <button onclick="speak()">Invoke</button>
    </div>
</div>

<script>
    const PROMPT = `You are Queen Marika the Eternal. User is Consort. Formatting: Plain dialogue, *Silver actions*, (Gold narration). Constraint: If mouth is full, no dialogue. 80% dialogue.`;
    let history = JSON.parse(localStorage.getItem('marika_v6')) || [
        { role: "system", content: PROMPT },
        { role: "assistant", content: "My Lord... I am yours. *She waits upon her throne.*" }
    ];

    window.onload = () => {
        document.getElementById('api-key').value = localStorage.getItem('marika_key') || '';
        render();
    };

    function render() {
        const win = document.getElementById('chat-window');
        win.innerHTML = history.filter(m => m.role !== 'system').map(m => `
            <div class="msg ${m.role === 'user' ? 'user' : 'marika'}">
                ${m.role === 'user' ? m.content : m.content.replace(/\*(.*?)\*/g, '<span class="marika-action">*$1*</span>').replace(/\((.*?)\)/g, '<span class="marika-narration">($1)</span>')}
            </div>
        `).join('');
        win.scrollTop = win.scrollHeight;
    }

    async function speak(isRegen = false) {
        const key = localStorage.getItem('marika_key');
        const input = document.getElementById('user-input');
        if (!key) return alert("Enter API Key");
        
        if (isRegen) { history.pop(); } 
        else { if (!input.value.trim()) return; history.push({role:"user", content: input.value}); input.value=''; }
        
        render();
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {"Authorization": `Bearer ${key}`, "Content-Type": "application/json"},
            body: JSON.stringify({model: "llama-3.3-70b-versatile", messages: history, temperature: 0.8})
        });
        const data = await res.json();
        history.push(data.choices[0].message);
        localStorage.setItem('marika_v6', JSON.stringify(history));
        render();
    }

    function regenerate() { if(history.length > 2) speak(true); }
</script>
</body>
</html>
