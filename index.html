<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Erdtree's Rest</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --silver: #a8a8a8; --stone: #0a0904; --sidebar-width: 320px; }
        
        body { 
            background: var(--stone); 
            color: #e0d7b8; 
            font-family: 'Crimson Pro', serif; 
            font-size: 20px; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            overflow: hidden; 
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width); height: 100vh; background: #000; border-right: 2px solid var(--gold);
            position: fixed; left: 0; top: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; z-index: 100;
        }
        .sidebar img { width: 100%; border: 1px solid var(--gold); border-radius: 4px; margin-bottom: 20px; }
        .sidebar h1 { font-family: 'Cinzel Decorative', serif; font-size: 1.1em; text-align: center; color: var(--gold); margin-bottom: 20px; }

        .action-btn { 
            width: 100%; background: transparent; border: 1px solid #332b00; color: #8a7b4a; padding: 10px; 
            font-family: 'Montserrat', sans-serif; font-weight: 500; cursor: pointer; font-size: 11px; transition: 0.3s;
        }
        .action-btn:hover { color: var(--gold); border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }

        /* Main Content */
        .main-content { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; height: 100vh; background: radial-gradient(circle at top right, #1c1808 0%, var(--stone) 100%); }
        #chat { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; }

        /* Messages & Custom Parsing Styles */
        .msg { margin-bottom: 30px; padding: 25px; border-radius: 2px; max-width: 85%; line-height: 1.6; box-shadow: 0 4px 20px rgba(0,0,0,0.4); white-space: pre-wrap; }
        .marika { background: rgba(212, 175, 55, 0.05); border-left: 3px solid var(--gold); align-self: flex-start; }
        .user { background: rgba(255, 255, 255, 0.03); border: 1px solid #222; align-self: flex-end; color: #fff; font-family: 'Montserrat', sans-serif; font-size: 17px; }

        /* Color-coding for Marika's Speech */
        .marika-action { color: var(--silver); font-style: italic; }
        .marika-narration { color: #8a7b4a; font-size: 0.9em; }

        /* Input Bar */
        #input-bar { padding: 30px 50px; background: #050503; display: flex; gap: 15px; border-top: 1px solid var(--gold); }
        input#user-input { flex: 1; padding: 18px; background: #111; border: 1px solid #332b00; color: #f3e5ab; font-size: 18px; outline: none; font-family: 'Montserrat', sans-serif; }
        .invoke-btn { padding: 0 40px; background: var(--gold); color: #000; font-family: 'Cinzel Decorative', serif; font-weight: bold; cursor: pointer; border: none; }
        .refresh-btn { background: #1a1a1a; color: var(--gold); border: 1px solid #332b00; padding: 0 20px; font-size: 24px; cursor: pointer; }

        .key-box { margin-top: auto; width: 100%; }
        .key-box input { width: 100%; background: #111; border: none; color: #444; font-size: 10px; padding: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="sidebar">
    <img src="marika.jpg" alt="Queen Marika">
    <h1>Queen Marika</h1>
    <button class="action-btn" onclick="clearChat()">RESET THE AGE</button>
    <div class="key-box">
        <input type="password" id="api-key" placeholder="Groq API Key" onchange="saveKey()">
    </div>
</div>

<div class="main-content">
    <div id="chat"></div>
    <div id="input-bar">
        <button class="refresh-btn" onclick="regenerate()">↻</button>
        <input type="text" id="user-input" placeholder="Speak to your Queen..." onkeypress="if(event.key === 'Enter') speak()">
        <button class="invoke-btn" id="send-btn" onclick="speak()">Invoke</button>
    </div>
</div>

<script>
    const SYSTEM_PROMPT = `You are Queen Marika the Eternal from Elden Ring. 
    IDENTITY: The user is your Lord and Consort.
    FORMATTING: 
    - Dialogue: Plain text. 
    - Actions: *Between asterisks* - Narration: (Between parentheses, use sparingly). 
    Rules: 80% Dialogue. Regal, superior, yet intimate tone.`;

    let chatHistory = [];

    window.onload = function() {
        const savedHistory = localStorage.getItem('marika_v3_history');
        const savedKey = localStorage.getItem('marika_api_key');
        if (savedKey) document.getElementById('api-key').value = savedKey;
        if (savedHistory) {
            chatHistory = JSON.parse(savedHistory);
            renderChat();
        } else {
            resetToDefault();
        }
    };

    function resetToDefault() {
        chatHistory = [
            { role: "system", content: SYSTEM_PROMPT },
            { role: "assistant", content: "My Lord... My Consort. You have mended the world. Speak, for I am yours. *She rests her hand upon the throne, looking out at the golden horizon.*" }
        ];
        saveAndRender();
    }

    function saveKey() { localStorage.setItem('marika_api_key', document.getElementById('api-key').value.trim()); }

    function saveAndRender() {
        localStorage.setItem('marika_v3_history', JSON.stringify(chatHistory));
        renderChat();
    }

    function formatMarikaText(text) {
        // Regex to wrap asterisks and parentheses in colored spans
        return text.replace(/\*(.*?)\*/g, '<span class="marika-action">*$1*</span>')
                   .replace(/\((.*?)\)/g, '<span class="marika-narration">($1)</span>');
    }

    function renderChat() {
        const container = document.getElementById('chat');
        container.innerHTML = '';
        chatHistory.forEach(msg => {
            if (msg.role === 'system') return;
            const div = document.createElement('div');
            div.className = `msg ${msg.role === 'user' ? 'user' : 'marika'}`;
            div.innerHTML = msg.role === 'user' ? msg.content : formatMarikaText(msg.content);
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }

    async function speak(isRegenerate = false) {
        const key = document.getElementById('api-key').value.trim();
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        let text = input.value.trim();
        
        if (isRegenerate) {
            if (chatHistory.length < 3) return;
            chatHistory.pop(); 
            text = chatHistory[chatHistory.length - 1].content; 
        } else {
            if (!text || !key) return;
            chatHistory.push({ role: "user", content: text });
            input.value = '';
        }

        saveAndRender();
        btn.disabled = true;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: chatHistory, temperature: 0.8 })
            });
            const data = await response.json();
            chatHistory.push({ role: "assistant", content: data.choices[0].message.content });
            saveAndRender();
        } catch (err) { alert("The Order is fractured: " + err.message); }
        finally { btn.disabled = false; }
    }

    function regenerate() { if (chatHistory.length > 2) speak(true); }
    function clearChat() { if(confirm("Reset the memory?")) resetToDefault(); }
</script>
</body>
</html>
