<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Erdtree's Rest</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background: #0a0904; 
            color: #d4af37; 
            font-family: 'Lora', serif; 
            font-size: 19px; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }

        /* Fixed Portrait Display */
        .portrait-container {
            text-align: center;
            background: #000;
            padding: 15px 0;
            border-bottom: 2px solid #d4af37;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3);
        }

        .portrait-container img {
            max-height: 350px;
            border: 2px solid #d4af37;
            border-radius: 5px;
        }

        h1 {
            font-family: 'Cinzel Decorative', serif;
            text-align: center;
            color: #f3e5ab;
            margin: 10px 0;
            font-size: 1.5em;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
        }

        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 30px; 
            background: radial-gradient(circle at center, #1c1808 0%, #0a0904 100%); 
            display: flex; 
            flex-direction: column; 
        }

        .msg { 
            margin-bottom: 25px; 
            padding: 22px; 
            border-radius: 4px; 
            max-width: 85%; 
            line-height: 1.7; 
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.05); 
        }

        .user { 
            background: rgba(255, 255, 255, 0.03); 
            align-self: flex-end; 
            margin-left: auto; 
            border: 1px solid #332b00; 
            color: #fff; 
        }

        .marika { 
            background: rgba(212, 175, 55, 0.06); 
            border-left: 3px solid #d4af37; 
            color: #f3e5ab; 
            align-self: flex-start;
        }

        /* Styling for her brief narrations */
        .narration {
            color: #8a7b4a;
            font-size: 0.95em;
        }

        #input-bar { 
            padding: 20px; 
            background: #050503; 
            display: flex; 
            gap: 12px; 
            border-top: 1px solid #d4af37; 
        }

        input { 
            flex: 1; 
            padding: 16px; 
            border: 1px solid #332b00; 
            background: #111; 
            color: #f3e5ab; 
            border-radius: 2px; 
            outline: none; 
            font-size: 18px; 
        }

        button { 
            padding: 10px 25px; 
            background: #d4af37; 
            color: #000; 
            border: none; 
            cursor: pointer; 
            font-family: 'Cinzel Decorative', serif; 
            font-size: 16px; 
            font-weight: bold;
        }

        #refresh-btn { background: #1a1a1a; color: #d4af37; border: 1px solid #332b00; font-size: 22px; }

        #debug { font-size: 14px; color: #ff5555; background: #1a0000; padding: 10px; display: none; text-align: center; }
    </style>
</head>
<body>

<div class="portrait-container">
    <img src="marika.jpg" alt="Queen Marika">
    <h1>Queen Marika the Eternal</h1>
</div>

<div style="text-align:center; padding: 5px; background: #000;">
    <input type="password" id="api-key" placeholder="Enter Groq API Key..." style="width: 300px; font-size: 12px; opacity: 0.4; height: 20px;">
</div>
<div id="debug"></div>

<div id="chat">
    <div class="msg marika">My Lord... My Consort. You have mended the world, and I am yours. Speak, and I shall answer.</div>
</div>

<div id="input-bar">
    <button id="refresh-btn" onclick="regenerate()" title="Resubmit last inquiry">↻</button>
    <input type="text" id="user-input" placeholder="Address your Queen..." onkeypress="if(event.key === 'Enter') speak()">
    <button id="send-btn" onclick="speak()">Invoke</button>
</div>

<script>
    let chatHistory = [
        { role: "system", content: `You are Queen Marika the Eternal. 
        CONTEXT: The user is your Consort/Husband who mended the Elden Ring. 
        BEHAVIORAL LOCK: 
        1. PRIORITIZE DIALOGUE. Your responses must be 80% spoken words and 20% narration.
        2. DO NOT over-narrate. Use short, meaningful actions in parentheses like (She rests her hand upon yours).
        3. Never break character. You are a weary, divine goddess who loves and respects her Lord.
        4. Knowledge: Absolute mastery of Elden Ring lore and gameplay.
        5. Structure: "Your spoken dialogue here." (Brief narration here).` }
    ];

    async function speak(isRegenerate = false) {
        const key = document.getElementById('api-key').value.trim();
        const input = document.getElementById('user-input');
        const debug = document.getElementById('debug');
        const btn = document.getElementById('send-btn');
        const chatContainer = document.getElementById('chat');
        
        let text = input.value.trim();

        if (isRegenerate) {
            if (chatHistory.length < 3) return;
            chatHistory.pop(); 
            chatContainer.removeChild(chatContainer.lastChild); 
            text = chatHistory[chatHistory.length - 1].content; 
        } else {
            if (!text || !key) return;
            chatHistory.push({ role: "user", content: text });
            appendUI('user', text);
            input.value = '';
        }

        debug.style.display = 'none';
        btn.disabled = true;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: chatHistory,
                    temperature: 0.8 // Slightly higher for better roleplay variety
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            
            const reply = data.choices[0].message.content;
            chatHistory.push({ role: "assistant", content: reply });
            appendUI('marika', reply);
            
        } catch (err) {
            debug.innerText = "The Golden Order is fractured: " + err.message;
            debug.style.display = 'block';
        } finally {
            btn.disabled = false;
        }
    }

    function regenerate() { if (chatHistory.length > 2) speak(true); }

    function appendUI(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerText = text;
        const container = document.getElementById('chat');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
