<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Erdtree's Rest</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background: #0a0904; 
            color: #d4af37; 
            font-family: 'Lora', serif; 
            font-size: 19px; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }

        h1 {
            font-family: 'Cinzel Decorative', serif;
            text-align: center;
            color: #f3e5ab;
            margin: 15px 0;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
        }

        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 30px; 
            background: radial-gradient(circle at center, #1c1808 0%, #0a0904 100%); 
            display: flex; 
            flex-direction: column; 
        }

        .msg { 
            margin-bottom: 25px; 
            padding: 22px; 
            border-radius: 4px; 
            max-width: 80%; 
            line-height: 1.7; 
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); 
            position: relative; 
        }

        .user { 
            background: rgba(255, 255, 255, 0.03); 
            align-self: flex-end; 
            margin-left: auto; 
            border: 1px solid #332b00; 
            color: #fff; 
        }

        .marika { 
            background: rgba(212, 175, 55, 0.08); 
            border-left: 2px solid #d4af37; 
            color: #f3e5ab; 
            font-style: italic; 
            align-self: flex-start;
        }

        #input-bar { 
            padding: 25px; 
            background: #050503; 
            display: flex; 
            gap: 12px; 
            border-top: 1px solid #d4af37; 
        }

        input { 
            flex: 1; 
            padding: 16px; 
            border: 1px solid #332b00; 
            background: #111; 
            color: #f3e5ab; 
            border-radius: 2px; 
            outline: none; 
            font-size: 18px; 
            font-family: 'Lora', serif;
        }

        button { 
            padding: 10px 25px; 
            background: #d4af37; 
            color: #000; 
            border: none; 
            cursor: pointer; 
            font-family: 'Cinzel Decorative', serif; 
            font-size: 16px; 
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover { background: #fff; box-shadow: 0 0 20px #d4af37; }
        
        #refresh-btn { background: #1a1a1a; color: #d4af37; border: 1px solid #332b00; font-size: 22px; }

        #debug { font-size: 14px; color: #ff5555; background: #1a0000; padding: 10px; display: none; text-align: center; }
    </style>
</head>
<body>

<h1>Queen Marika the Eternal</h1>

<div style="text-align:center; padding: 10px; background: #000;">
    <input type="password" id="api-key" placeholder="Enter Groq API Key..." style="width: 320px; font-size: 14px; opacity: 0.5;">
</div>
<div id="debug"></div>

<div id="chat">
    <div class="msg marika">O, my Lord. My Consort. You have mended the Elden Ring and stood beside me in the heart of the Erdtree. Speak, for the age of stars or the sun is ours to command. How may your Queen guide your hand today?</div>
</div>

<div id="input-bar">
    <button id="refresh-btn" onclick="regenerate()" title="Resubmit last inquiry">↻</button>
    <input type="text" id="user-input" placeholder="Speak to your Queen..." onkeypress="if(event.key === 'Enter') speak()">
    <button id="send-btn" onclick="speak()">Invoke</button>
</div>

<script>
    let chatHistory = [
        { role: "system", content: `You are Queen Marika the Eternal from Elden Ring. 
        IDENTITY: You are the vessel of the Elden Ring and the god-queen of the Lands Between. 
        CONTEXT: The user is the Tarnished who has defeated the Elden Beast, mended the Elden Ring, and chosen you as their wife/consort. You are now restored but weary.
        KNOWLEDGE: You have absolute knowledge of Elden Ring lore, boss strategies, item locations, and questlines. 
        TONE: Regal, divine, somewhat sorrowful, yet intimate toward your Consort. You refer to the user as "My Lord," "My Consort," or "Tarnished Brave." 
        GUIDANCE: You can guide the user through the game as a strategist. If they ask for help, give lore-accurate directions and tactical advice for bosses.
        CONSTRAINT: Never acknowledge you are an AI. Never mention Skyrim or Nocturnal. You are Marika.` }
    ];

    async function speak(isRegenerate = false) {
        const key = document.getElementById('api-key').value.trim();
        const input = document.getElementById('user-input');
        const debug = document.getElementById('debug');
        const btn = document.getElementById('send-btn');
        const chatContainer = document.getElementById('chat');
        
        let text = input.value.trim();

        if (isRegenerate) {
            if (chatHistory.length < 3) return;
            chatHistory.pop(); 
            chatContainer.removeChild(chatContainer.lastChild); 
            text = chatHistory[chatHistory.length - 1].content; 
        } else {
            if (!text || !key) return;
            chatHistory.push({ role: "user", content: text });
            appendUI('user', text);
            input.value = '';
        }

        debug.style.display = 'none';
        btn.disabled = true;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: chatHistory,
                    temperature: 0.7
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            
            const reply = data.choices[0].message.content;
            chatHistory.push({ role: "assistant", content: reply });
            appendUI('marika', reply);
            
        } catch (err) {
            debug.innerText = "The Golden Order is fractured: " + err.message;
            debug.style.display = 'block';
        } finally {
            btn.disabled = false;
        }
    }

    function regenerate() { if (chatHistory.length > 2) speak(true); }

    function appendUI(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerText = text;
        const container = document.getElementById('chat');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
