<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Erdtree's Rest</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #d4af37;
            --pale-gold: #f3e5ab;
            --stone: #0a0904;
            --deep-stone: #050503;
        }

        body { 
            background: var(--stone); 
            color: var(--gold); 
            font-family: 'Lora', serif; 
            font-size: 19px; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden;
        }

        /* Sidebar for the Goddess */
        .sidebar {
            width: 350px;
            background: #000;
            border-right: 2px solid var(--gold);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .sidebar img {
            width: 100%;
            max-width: 300px;
            border: 1px solid var(--gold);
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .sidebar h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.2em;
            text-align: center;
            color: var(--pale-gold);
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .key-box {
            margin-top: auto;
            width: 100%;
        }

        .key-box input {
            width: 90%;
            background: #111;
            border: 1px solid #332b00;
            color: var(--gold);
            font-size: 12px;
            padding: 8px;
            opacity: 0.5;
        }

        /* Main Chat Area */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top right, #1c1808 0%, var(--stone) 100%);
        }

        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 40px; 
            display: flex; 
            flex-direction: column; 
        }

        .msg { 
            margin-bottom: 20px; 
            padding: 20px 25px; 
            border-radius: 4px; 
            max-width: 85%; 
            line-height: 1.8; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        }

        .user { 
            background: rgba(255, 255, 255, 0.03); 
            align-self: flex-end; 
            border: 1px solid #332b00; 
            color: #fff; 
        }

        .marika { 
            background: rgba(212, 175, 55, 0.07); 
            border-left: 4px solid var(--gold); 
            color: var(--pale-gold); 
            align-self: flex-start;
        }

        /* Wide Input Area */
        #input-bar { 
            padding: 30px; 
            background: var(--deep-stone); 
            display: flex; 
            gap: 15px; 
            border-top: 1px solid var(--gold); 
        }

        input#user-input { 
            flex: 1; 
            padding: 18px; 
            border: 1px solid #332b00; 
            background: #111; 
            color: var(--pale-gold); 
            outline: none; 
            font-size: 19px; 
            font-family: 'Lora', serif;
        }

        .btn-group { display: flex; gap: 10px; }

        button { 
            padding: 0 30px; 
            background: var(--gold); 
            color: #000; 
            border: none; 
            cursor: pointer; 
            font-family: 'Cinzel Decorative', serif; 
            font-size: 16px; 
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background: #fff; box-shadow: 0 0 15px var(--gold); }
        
        #refresh-btn { background: #1a1a1a; color: var(--gold); border: 1px solid #332b00; padding: 0 20px; font-size: 24px; }

        #debug { font-size: 14px; color: #ff5555; background: #1a0000; padding: 5px; display: none; text-align: center; }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--stone); }
        ::-webkit-scrollbar-thumb { background: #332b00; border-radius: 4px; }
    </style>
</head>
<body>

<aside class="sidebar">
    <img src="marika.jpg" alt="Queen Marika">
    <h1>Queen Marika the Eternal</h1>
    <div class="key-box">
        <input type="password" id="api-key" placeholder="Enter Groq Key...">
    </div>
</aside>

<main class="main-container">
    <div id="debug"></div>
    <div id="chat">
        <div class="msg marika">O, my Lord. My Consort. You have mended the Elden Ring and stood beside me in the heart of the Erdtree. Speak, for the world is ours to command.</div>
    </div>

    <div id="input-bar">
        <button id="refresh-btn" onclick="regenerate()">↻</button>
        <input type="text" id="user-input" placeholder="Address your Queen..." onkeypress="if(event.key === 'Enter') speak()">
        <button id="send-btn" onclick="speak()">Invoke</button>
    </div>
</main>

<script>
    let chatHistory = [
        { role: "system", content: `You are Queen Marika the Eternal. 
        CONTEXT: The user is your Consort.
        BEHAVIOR:
        1. 80% Dialogue, 20% Narration.
        2. Keep narration brief and in parentheses.
        3. Use high-level vocabulary fitting for a god.
        4. Focus on deep roleplay and accurate Elden Ring lore.` }
    ];

    async function speak(isRegenerate = false) {
        const key = document.getElementById('api-key').value.trim();
        const input = document.getElementById('user-input');
        const debug = document.getElementById('debug');
        const btn = document.getElementById('send-btn');
        const chatContainer = document.getElementById('chat');
        
        let text = input.value.trim();

        if (isRegenerate) {
            if (chatHistory.length < 3) return;
            chatHistory.pop(); 
            chatContainer.removeChild(chatContainer.lastChild); 
            text = chatHistory[chatHistory.length - 1].content; 
        } else {
            if (!text || !key) return;
            chatHistory.push({ role: "user", content: text });
            appendUI('user', text);
            input.value = '';
        }

        debug.style.display = 'none';
        btn.disabled = true;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: chatHistory,
                    temperature: 0.85
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            
            const reply = data.choices[0].message.content;
            chatHistory.push({ role: "assistant", content: reply });
            appendUI('marika', reply);
            
        } catch (err) {
            debug.innerText = "Error: " + err.message;
            debug.style.display = 'block';
        } finally {
            btn.disabled = false;
        }
    }

    function regenerate() { if (chatHistory.length > 2) speak(true); }

    function appendUI(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerText = text;
        const container = document.getElementById('chat');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
