<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Erdtree's Rest</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --silver: #a8a8a8; --stone: #0a0904; --dark-bg: #050503; }
        
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; 
            height: 100dvh; /* Dynamic height for mobile browsers */
            background: var(--stone); color: #e0d7b8; 
            font-family: 'Crimson Pro', serif; overflow: hidden; display: flex; 
        }

        /* PC SIDEBAR */
        #sidebar {
            width: 300px; height: 100dvh; background: #000; border-right: 2px solid var(--gold);
            display: flex; flex-direction: column; padding: 15px; flex-shrink: 0;
        }
        .portrait-container { width: 100%; display: flex; justify-content: center; }
        #sidebar img { max-width: 100%; height: auto; max-height: 50dvh; border: 1px solid var(--gold); border-radius: 2px; object-fit: contain; }
        #sidebar h1 { font-family: 'Cinzel Decorative'; color: var(--gold); font-size: 1.1em; text-align: center; margin: 15px 0; }

        .admin-box { margin-top: auto; padding-top: 10px; border-top: 1px solid #222; }
        .admin-box input { width: 100%; background: #111; border: 1px solid #332b00; color: #666; font-size: 11px; padding: 8px; margin-bottom: 8px; outline: none; }
        .reset-btn { width: 100%; background: transparent; border: 1px solid #333; color: #444; font-size: 9px; padding: 5px; cursor: pointer; }

        /* MAIN AREA */
        #main { flex-grow: 1; display: flex; flex-direction: column; height: 100dvh; background: radial-gradient(circle at top right, #1c1808 0%, var(--stone) 100%); }
        
        /* CHAT WINDOW: Max-width stops the "Dead Space" feel on wide monitors */
        #chat-window { 
            flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; 
            max-width: 1000px; margin: 0 auto; width: 100%;
        }

        /* INPUT AREA */
        #input-area { 
            height: 80px; background: var(--dark-bg); border-top: 1px solid var(--gold); 
            display: flex; align-items: center; padding: 0 20px; gap: 10px; flex-shrink: 0;
            width: 100%;
        }

        .msg { margin-bottom: 20px; padding: 18px; max-width: 90%; line-height: 1.6; font-size: 19px; border-radius: 2px; }
        .marika { background: rgba(212, 175, 55, 0.05); border-left: 3px solid var(--gold); align-self: flex-start; }
        .user { background: rgba(255, 255, 255, 0.03); border: 1px solid #222; align-self: flex-end; color: #fff; }
        .marika-action { color: var(--silver); font-style: italic; }
        .marika-narration { color: #8a7b4a; font-size: 0.9em; }

        #user-input { flex: 1; height: 45px; background: #111; border: 1px solid #332b00; color: #f3e5ab; font-size: 16px; padding: 0 15px; outline: none; }
        .invoke-btn { height: 45px; padding: 0 25px; background: var(--gold); font-family: 'Cinzel Decorative'; font-weight: bold; border: none; cursor: pointer; }

        /* MOBILE FIXES */
        @media (max-width: 800px) {
            body { flex-direction: column; height: 100dvh; }
            #sidebar { width: 100%; height: auto; flex-direction: row; border-right: none; border-bottom: 1px solid var(--gold); padding: 5px 15px; }
            .portrait-container { width: 45px; height: 45px; }
            #sidebar img { height: 45px; width: 45px; object-fit: cover; }
            #sidebar h1 { margin: 0 10px; font-size: 0.8em; text-align: left; flex: 1; }
            .admin-box { display: none; }
            #main { height: auto; flex: 1; min-height: 0; }
            #chat-window { padding: 15px; }
            #input-area { height: 70px; padding: 0 10px; }
            .invoke-btn { padding: 0 15px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="portrait-container"><img src="marika.jpg" alt="Marika"></div>
    <h1>Queen Marika</h1>
    <div class="admin-box">
        <input type="password" id="api-key" placeholder="API Key" onchange="localStorage.setItem('marika_key', this.value)">
        <button class="reset-btn" onclick="if(confirm('Reset?')) { localStorage.removeItem('marika_history'); location.reload(); }">RESET</button>
    </div>
</div>

<div id="main">
    <div id="chat-window"></div>
    <div id="input-area">
        <button onclick="regenerate()" style="background:#1a1a1a; color:var(--gold); border:1px solid #332b00; height:45px; width:45px; cursor:pointer;">↻</button>
        <input type="text" id="user-input" placeholder="Address your Queen..." onkeypress="if(event.key === 'Enter') speak()">
        <button class="invoke-btn" onclick="speak()">Invoke</button>
    </div>
</div>

<script>
    const PROMPT = `You are Queen Marika the Eternal. User is Consort. Formatting: Plain dialogue, *Silver actions*, (Gold narration). Constraint: 80% dialogue.`;
    let history = JSON.parse(localStorage.getItem('marika_history')) || [
        { role: "system", content: PROMPT },
        { role: "assistant", content: "My Lord... I am yours. *She waits upon her throne.*" }
    ];

    window.onload = () => {
        const savedKey = localStorage.getItem('marika_key');
        if (savedKey) document.getElementById('api-key').value = savedKey;
        render();
    };

    function render() {
        const win = document.getElementById('chat-window');
        win.innerHTML = history.filter(m => m.role !== 'system').map(m => `
            <div class="msg ${m.role === 'user' ? 'user' : 'marika'}">
                ${m.role === 'user' ? m.content : m.content.replace(/\*(.*?)\*/g, '<span class="marika-action">*$1*</span>').replace(/\((.*?)\)/g, '<span class="marika-narration">($1)</span>')}
            </div>
        `).join('');
        win.scrollTop = win.scrollHeight;
    }

    async function speak(isRegen = false) {
        const key = localStorage.getItem('marika_key');
        const input = document.getElementById('user-input');
        if (!key) return alert("Enter API Key.");
        if (isRegen) { history.pop(); } 
        else { if (!input.value.trim()) return; history.push({role:"user", content: input.value}); input.value=''; }
        render();
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {"Authorization": `Bearer ${key}`, "Content-Type": "application/json"},
                body: JSON.stringify({model: "llama-3.3-70b-versatile", messages: history, temperature: 0.8})
            });
            const data = await res.json();
            history.push(data.choices[0].message);
            localStorage.setItem('marika_history', JSON.stringify(history));
            render();
        } catch(e) { alert("Error: " + e); }
    }
    function regenerate() { if(history.length > 2) speak(true); }
</script>
</body>
</html>
